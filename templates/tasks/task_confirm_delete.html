{% extends 'base.html' %}
{% block title %}Eliminar Tarea{% endblock %}
{% block content %}
<div class="card">
    <h2>Eliminar Tarea</h2>
    <p>¿Est&aacute;s seguro de eliminar "{{ task.title }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Eliminar</button>
        <a href="{% url 'task_list' %}" class="btn btn-primary">Cancelar</a>
    </form>
</div>
{% endblock %}
