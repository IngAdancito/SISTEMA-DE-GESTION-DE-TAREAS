{% extends 'base.html' %}
{% block title %}{% if object %}Editar{% else %}Nueva{% endif %} Tarea{% endblock %}
{% block content %}
<div class="card">
    <h2>{% if object %}Editar{% else %}Nueva{% endif %} Tarea</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="{% url 'task_list' %}" class="btn btn-primary">Cancelar</a>
    </form>
</div>
{% endblock %}
